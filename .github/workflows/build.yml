name: Build 미디어 스플리터

on:
    workflow_dispatch:
        inputs:
            version:
                description: '이름 변경 (예: v1.0.3)'
                required: true
                default: 'v1.0.3'

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      artifact_name: media_splitter_windows
                      pyinstaller_args: --onefile --windowed --icon=icon.ico
                    - os: macos-latest
                      artifact_name: media_splitter_mac
                      pyinstaller_args: --onedir --windowed --icon=icon.icns

        runs-on: ${{ matrix.os }}

        steps:
            - name: 코드 체크아웃
              uses: actions/checkout@v4

            - name: Python 설치
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: 의존성 설치
              run: pip install pymupdf pyqt6 pyinstaller

            - name: ffmpeg 설치 (macOS)
              if: matrix.os == 'macos-latest'
              run: |
                  brew install ffmpeg
                  cp $(which ffmpeg) ./ffmpeg

            - name: ffmpeg 설치 (Windows)
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
                  Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp
                  $ffmpeg = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe | Select-Object -First 1
                  Copy-Item $ffmpeg.FullName -Destination ffmpeg.exe

            - name: 빌드 (macOS)
              if: matrix.os == 'macos-latest'
              run: pyinstaller ${{ matrix.pyinstaller_args }} -y --add-binary "ffmpeg:." media_splitter.py

            - name: 코드 서명 (macOS, ad-hoc)
              if: matrix.os == 'macos-latest'
              run: |
                  # 라이브러리 검증 비활성화 엔타이틀먼트
                  cat > /tmp/entitlements.plist << 'PLIST'
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                      <key>com.apple.security.cs.disable-library-validation</key>
                      <true/>
                      <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
                      <true/>
                  </dict>
                  </plist>
                  PLIST

                  # .dylib, .so 서명
                  find dist/media_splitter -type f \( -name "*.dylib" -o -name "*.so" \) \
                    -exec codesign --force --sign - {} \;

                  # 메인 실행 파일: 엔타이틀먼트 포함 서명 (라이브러리 검증 비활성화)
                  codesign --force --sign - \
                    --entitlements /tmp/entitlements.plist \
                    dist/media_splitter/media_splitter

            - name: 빌드 (Windows)
              if: matrix.os == 'windows-latest'
              run: pyinstaller ${{ matrix.pyinstaller_args }} -y --add-binary "ffmpeg.exe;." media_splitter.py

            - name: 압축 (macOS)
              if: matrix.os == 'macos-latest'
              run: cd dist && zip -r media_splitter_mac.zip media_splitter/

            - name: 압축 (Windows)
              if: matrix.os == 'windows-latest'
              run: cd dist && Compress-Archive -Path media_splitter.exe -DestinationPath media_splitter_windows.zip
              shell: pwsh

            - name: 결과물 업로드
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: dist/*.zip

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: 아티팩트 다운로드
              uses: actions/download-artifact@v4
              with:
                  path: artifacts/

            - name: GitHub Release 생성 및 파일 업로드
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.inputs.version }}
                  name: ${{ github.event.inputs.version }}
                  files: artifacts/**/*.zip
