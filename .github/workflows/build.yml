name: Build 미디어 스플리터

on:
    workflow_dispatch:
        inputs:
            version:
                description: '릴리스 버전 (예: v1.0.1)'
                required: true
                default: 'v1.0.2'

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      artifact_name: media_splitter_windows
                      pyinstaller_args: --onefile --windowed --icon=icon.ico
                    - os: macos-latest
                      artifact_name: media_splitter_mac
                      pyinstaller_args: --onedir --windowed --icon=icon.icns

        runs-on: ${{ matrix.os }}

        steps:
            - name: 코드 체크아웃
              uses: actions/checkout@v4

            - name: Python 설치
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: 의존성 설치
              run: pip install pymupdf pyqt6 pyinstaller

            - name: ffmpeg 설치 (macOS)
              if: matrix.os == 'macos-latest'
              run: |
                  brew install ffmpeg
                  cp $(which ffmpeg) ./ffmpeg

            - name: ffmpeg 설치 (Windows)
              if: matrix.os == 'windows-latest'
              shell: pwsh
              run: |
                  Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
                  Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp
                  $ffmpeg = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe | Select-Object -First 1
                  Copy-Item $ffmpeg.FullName -Destination ffmpeg.exe

            - name: 빌드 (macOS)
              if: matrix.os == 'macos-latest'
              run: pyinstaller ${{ matrix.pyinstaller_args }} -y --add-binary "ffmpeg:." media_splitter.py

            - name: 코드 서명 (macOS, ad-hoc)
              if: matrix.os == 'macos-latest'
              run: |
                  find dist/media_splitter -type f | while IFS= read -r f; do
                    if file "$f" | grep -q "Mach-O"; then
                      codesign --force --sign - "$f" 2>/dev/null || true
                    fi
                  done

            - name: 빌드 (Windows)
              if: matrix.os == 'windows-latest'
              run: pyinstaller ${{ matrix.pyinstaller_args }} -y --add-binary "ffmpeg.exe;." media_splitter.py

            - name: 압축 (macOS)
              if: matrix.os == 'macos-latest'
              run: cd dist && zip -r media_splitter_mac.zip media_splitter/

            - name: 압축 (Windows)
              if: matrix.os == 'windows-latest'
              run: cd dist && Compress-Archive -Path media_splitter.exe -DestinationPath media_splitter_windows.zip
              shell: pwsh

            - name: 결과물 업로드
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: dist/*.zip

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: 아티팩트 다운로드
              uses: actions/download-artifact@v4
              with:
                  path: artifacts/

            - name: GitHub Release 생성 및 파일 업로드
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.inputs.version }}
                  name: ${{ github.event.inputs.version }}
                  files: artifacts/**/*.zip
